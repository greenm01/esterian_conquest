<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ESTERIAN CONQUEST | PROJECT</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --fg: #33ff33;
            --fg-dim: #9dff9d;
            --link: #ffffff;
            --glow: rgba(51, 255, 51, 0.12);
        }
        * { box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
        }
        .terminal {
            border: 1px solid var(--fg);
            padding: 30px;
            box-shadow: 0 0 10px var(--glow);
            width: min(100%, 560px);
            text-align: left;
        }
        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background: var(--fg);
            margin-left: 5px;
            animation: blink 1s infinite;
            vertical-align: middle;
        }
        @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
        a {
            color: var(--link);
            text-decoration: none;
            border-bottom: 1px solid var(--fg);
        }
        a:hover {
            background: var(--fg);
            color: var(--bg);
        }
        .header {
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--fg);
            padding-bottom: 5px;
            display: inline-block;
        }
        .section {
            margin-top: 18px;
        }
        .label {
            color: var(--fg-dim);
        }
        .nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 16px;
            margin-top: 6px;
        }
        p {
            margin: 0 0 8px;
            line-height: 1.45;
        }
        @media (max-width: 640px) {
            .terminal {
                padding: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="header">ESTERIAN_CONQUEST_OS v1.0</div>
        <p>IDENTITY: ec_sysop@esterianconquest.com</p>
        <p>RELAY: wss://relay.esterianconquest.com</p>

        <div class="section">

            <div class="nav">
                <a href="downloads.html">DOWNLOADS</a>
                <a href="https://github.com/greenm01/esterian_conquest" target="_blank" rel="noopener noreferrer">SOURCE CODE</a>
                <a href="https://discord.gg/FMr8sfBa" target="_blank" rel="noopener noreferrer">DISCORD</a>
                <a href="https://primal.net/p/npub1u59207e335pxpww0r0h7scy09e99pccg5sh0xlj3v88pcyf2uwas94n0v7" target="_blank" rel="noopener noreferrer">NOSTR</a>
            </div>
        </div>

        <div class="section">
            <p>THE CONQUEST HAS BEGUN.</p>
            <p>LOOKING FOR A CLIENT BUILD? OPEN <a href="downloads.html">DOWNLOADS</a>.</p>
            <p>LOOKING FOR A LIVE GAME? START ON <a href="https://discord.gg/FMr8sfBa" target="_blank" rel="noopener noreferrer">DISCORD</a>.</p>
        </div>

        <p>> <span class="cursor"></span></p>

</body>
</html>
